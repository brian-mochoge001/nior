services:
  - type: web
    name: nior
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --production
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.0
    healthCheckPath: /api/health
    autoDeploy: true
